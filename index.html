    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(PAYLOAD));
    const html=new TextDecoder().decode(pt);
    document.open();document.write(html);document.close();
    return true;
  }catch(err){
    e.textContent='Incorrect login or password.';
    if(b){b.disabled=false; b.textContent='Unlock';}
    return false;
  }
}

  ev.preventDefault();
  unlock(document.getElementById('u').value, document.getElementById('p').value);
});
// Auto-unlock when credentials are supplied via the URL (?u=..&p=.. or #u=..&p=..)
(function(){
  const u=readParam('u'), p=readParam('p');
  if(u!==null && p!==null){
    document.getElementById('u').value=u;
    document.getElementById('p').value=p;
    unlock(u,p);
  }
})();
